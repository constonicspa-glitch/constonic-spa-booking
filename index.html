<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>康姿多儷 SPA 線上預約</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-shell">
    <header class="brand-header">
      <div class="logo-mark">牡丹</div>
      <div>
        <p class="eyebrow">CONSTONIC BEAUTY CENTER</p>
        <h1>康姿多儷 SPA 線上預約</h1>
        <p class="subtitle">請依序選擇療程與日期，實際預約由店家再次確認。</p>
      </div>
    </header>

    <main>
      <section class="card">
        <h2>1. 選擇療程類別</h2>
        <div id="categoryButtons" class="button-grid"></div>
      </section>

      <section class="card">
        <h2>2. 選擇療程</h2>
        <div id="serviceList" class="service-list muted">請先選擇療程類別。</div>
      </section>

      <section class="card">
        <h2>3. 本次預約清單</h2>
        <div id="cartList" class="cart-list muted">尚未加入療程。</div>
        <div id="teacherFee" class="hint"></div>
        <div id="cartTotal" class="summary-total"></div>
        <button type="button" onclick="clearCart()">清空預約清單</button>
      </section>

      <section class="card hidden" id="nailRequestCard">
        <h2>4. 美甲諮詢預約</h2>
        <p class="hint">美甲時間會依照款式與卸甲狀況調整，請填寫希望時段，店家會再確認正式時間。</p>
        <div class="form-grid">
          <div class="field"><label>希望時段</label><select id="nailPreferredPeriod"><option>上午</option><option>下午</option><option>晚上</option></select></div>
          <div class="field"><label>希望時間</label><input id="nailPreferredTime" placeholder="例如：14:00 後都可以" /></div>
          <div class="field"><label>手部／足部</label><select id="nailPart"><option>手部</option><option>足部</option><option>手足皆可</option></select></div>
          <div class="field"><label>樣式</label><select id="nailStyle"><option>單色</option><option>造型</option><option>卸甲</option><option>保養</option><option>其他</option></select></div>
        </div>
        <div class="field"><label>美甲備註</label><textarea id="nailNote" rows="3" placeholder="可填寫想做的款式、是否卸甲、特殊需求"></textarea></div>
      </section>

      <section class="card">
        <h2>5. 選擇日期</h2>
        <div class="field"><label>預約日期</label><input type="date" id="date" /></div>
      </section>

      <section class="card" id="slotCard">
        <h2>6. 選擇可預約時段</h2>
        <div id="slotList" class="slot-list muted">請先加入療程並選擇日期。</div>
      </section>

      <section class="card">
        <h2>7. 填寫聯絡資料</h2>
        <form id="bookingForm">
          <div class="form-grid">
            <div class="field"><label>姓名</label><input id="name" required /></div>
            <div class="field"><label>電話</label><input id="phone" required /></div>
            <div class="field"><label>LINE</label><input id="lineName" placeholder="可填 LINE 名稱或 ID" /></div>
            <div class="field"><label>第一次來店</label><select id="firstVisit"><option>是</option><option>否</option></select></div>
          </div>
          <div class="field"><label>備註</label><textarea id="note" rows="3"></textarea></div>
          <div id="summary" class="summary-box"></div>
          <button id="submitBtn" type="submit" class="primary">送出預約</button>
          <p id="formMessage" class="hint"></p>
        </form>
      </section>
    </main>
  </div>

  <div id="successModal" class="modal hidden">
    <div class="modal-content success-content">
      <h2>✓ 預約送出成功</h2>
      <p>已送出預約申請，店家會再確認正式時間。</p>
      <div id="successDetail"></div>
      <button type="button" class="primary" onclick="location.reload()">回首頁</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
